<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flaskctrl dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono&family=Fraunces:wght@600&display=swap');
        
        :root {
            --ink: #1a1814; --paper: #f5f2ec; --paper2: #edeae2; --border: #c8c4b8;
            --green: #1D9E75; --red: #A32D2D; --accent: #5340c8;
        }

        body { background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; margin: 0; padding: 40px; }
        .shell { max-width: 800px; margin: 0 auto; }
        
        /* Header Styling */
        .topbar { display: flex; align-items: center; justify-content: space-between; border-bottom: 1.5px solid var(--ink); padding-bottom: 1rem; margin-bottom: 2rem; }
        .logo { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; }
        .logo span { color: var(--accent); }
        .timestamp { background: var(--ink); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        .subtitle { font-style: italic; color: #888; font-size: 12px; }

        /* App Cards */
        .apps { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
        .app-card { background: var(--paper2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; transition: transform 0.1s; }
        .app-card:hover { transform: translateY(-2px); border-color: var(--ink); }
        
        .card-head { display: flex; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; background: #ccc; }
        .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }
        
        .app-name { font-family: 'Fraunces', serif; font-size: 18px; }
        .port { margin-left: auto; color: #888; font-size: 10px; }

        .meta-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .meta-label { color: #888; }
        .meta-val { font-weight: bold; text-transform: uppercase; }

        /* Buttons & Console */
        .check-btn { width: 100%; margin-top: 10px; background: transparent; border: 1px solid var(--border); padding: 5px; cursor: pointer; font-family: 'DM Mono'; font-size: 11px; border-radius: 4px; }
        .check-btn:hover { background: var(--ink); color: white; }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .console { background: var(--ink); color: #a8e6cf; border-radius: 8px; padding: 15px; font-size: 12px; margin-bottom: 1rem; min-height: 40px; }
        .footer { display: flex; justify-content: space-between; font-size: 10px; color: #888; border-top: 1px solid var(--border); padding-top: 10px; }
        .badge-dark { background: var(--ink); color: white; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="shell">
    <div class="topbar">
        <div class="logo">flask<span>ctrl</span></div>
        <div class="timestamp" id="live-clock">00:00:00</div>
        <div class="subtitle">Live Health Check</div>
    </div>

    <div class="apps">
        {% for server in servers %}
        <div class="app-card">
            <div class="card-head">
                <div id="dot-{{ server.id }}" class="dot"></div>
                <div class="app-name">{{ server.name }}</div>
                <div class="port">:5000</div>
            </div>
            <div class="meta-row">
                <span class="meta-label">IP</span>
                <span class="meta-val">{{ server.ip }}</span>
            </div>
            <div class="meta-row">
                <span class="meta-label">Health</span>
                <span id="text-{{ server.id }}" class="meta-val">Checking...</span>
            </div>
            <button class="check-btn" id="btn-{{ server.id }}" onclick="recheck({{ server.id }})">RECHECK</button>
        </div>
        {% endfor %}
    </div>

    <div class="console" id="log-msg">
        System initialized. Starting connectivity tests...
    </div>

    <div class="footer">
        <span class="badge-dark">Auto-refresh every 10s</span>
        <span>Internal Network Monitor</span>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    async function recheck(serverId) {
        const btn = document.getElementById(`btn-${serverId}`);
        const dot = document.getElementById(`dot-${serverId}`);
        const text = document.getElementById(`text-${serverId}`);
        const log = document.getElementById('log-msg');

        btn.disabled = true;
        btn.innerText = "PINGING...";
        log.innerText = `Testing connection to Server ${serverId}...`;

        try {
            const response = await fetch(`/api/recheck/${serverId}`);
            const data = await response.json();

            text.innerText = data.status;
            text.style.color = data.class === 'online' ? 'var(--green)' : 'var(--red)';
            dot.className = `dot ${data.class}`;
            log.innerText = `Server ${serverId} is ${data.status}.`;
        } catch (err) {
            text.innerText = "ERROR";
            dot.className = "dot offline";
            log.innerText = `Failed to contact monitoring backend for Server ${serverId}.`;
        } finally {
            btn.disabled = false;
            btn.innerText = "RECHECK";
        }
    }

    // Run initial checks for both on load
    window.onload = () => {
        updateClock();
        {% for server in servers %}
        recheck({{ server.id }});
        {% endfor %}
    };
    
    // Auto-refresh logic
    setInterval(() => {
        {% for server in servers %}
        recheck({{ server.id }});
        {% endfor %}
    }, 10000);
</script>

</body>
</html>
